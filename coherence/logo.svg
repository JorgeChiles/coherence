<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="1024" height="1024">

  <!-- Fondo -->
  <rect width="680" height="680" rx="72" fill="#060606"/>

  <!-- Cuadrícula sutil -->
  <line x1="0" y1="340" x2="680" y2="340" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>
  <line x1="340" y1="0" x2="340" y2="680" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>

  <!-- C arc — cx=340 cy=310 r=210 stroke-width=70 -->
  <!-- 7 segmentos de 38.57° cada uno, antihorario de 315° a 45° -->
  <!-- P0=315°:(488.5,161.5) P1=276.43°:(363.9,101.4) P2=237.86°:(228.4,132.1) -->
  <!-- P3=199.29°:(141.8,240.6) P4=160.71°:(141.8,379.4) P5=122.14°:(228.4,487.9) -->
  <!-- P6=83.57°:(363.9,518.6) P7=45°:(488.5,458.5) -->

  <!-- Seg 1 Violeta -->
  <path d="M 488.5 161.5 A 210 210 0 0 0 363.9 101.4"
        fill="none" stroke="#BF5AF2" stroke-width="70" stroke-linecap="butt"/>
  <!-- Seg 2 Azul -->
  <path d="M 363.9 101.4 A 210 210 0 0 0 228.4 132.1"
        fill="none" stroke="#0A84FF" stroke-width="70" stroke-linecap="butt"/>
  <!-- Seg 3 Cian -->
  <path d="M 228.4 132.1 A 210 210 0 0 0 141.8 240.6"
        fill="none" stroke="#00C5E8" stroke-width="70" stroke-linecap="butt"/>
  <!-- Seg 4 Verde -->
  <path d="M 141.8 240.6 A 210 210 0 0 0 141.8 379.4"
        fill="none" stroke="#30D158" stroke-width="70" stroke-linecap="butt"/>
  <!-- Seg 5 Amarillo -->
  <path d="M 141.8 379.4 A 210 210 0 0 0 228.4 487.9"
        fill="none" stroke="#FFD60A" stroke-width="70" stroke-linecap="butt"/>
  <!-- Seg 6 Naranja -->
  <path d="M 228.4 487.9 A 210 210 0 0 0 363.9 518.6"
        fill="none" stroke="#FF9F0A" stroke-width="70" stroke-linecap="butt"/>
  <!-- Seg 7 Rojo -->
  <path d="M 363.9 518.6 A 210 210 0 0 0 488.5 458.5"
        fill="none" stroke="#FF3B30" stroke-width="70" stroke-linecap="butt"/>

  <!-- Puntas redondeadas -->
  <circle cx="488.5" cy="161.5" r="35" fill="#BF5AF2"/>
  <circle cx="488.5" cy="458.5" r="35" fill="#FF3B30"/>

  <!-- Línea de referencia interior -->
  <line x1="185" y1="310" x2="472" y2="310"
        stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.07" stroke-dasharray="5 5"/>

  <!-- Curva de respuesta en frecuencia -->
  <path d="M 185 310 C 235 288 268 342 318 305 S 382 270 432 310 S 458 328 472 310"
        fill="none" stroke="#ffffff" stroke-width="1.6" stroke-opacity="0.3"/>

  <!-- Separador -->
  <line x1="170" y1="580" x2="510" y2="580"
        stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Wordmark -->
  <text x="340" y="608"
        font-family="-apple-system, system-ui, 'Helvetica Neue', sans-serif"
        font-size="17" font-weight="300" letter-spacing="7"
        fill="#ffffff" fill-opacity="0.5" text-anchor="middle">COHERENCE</text>

</svg>
