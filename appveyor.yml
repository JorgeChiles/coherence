version: '0.1.{build}'

image: Visual Studio 2022

environment:
  PYTHON: "C:\\Python311-x64"

build: off

install:
  - cmd: "%PYTHON%\\python.exe --version"
  - cmd: "%PYTHON%\\python.exe -m pip install --upgrade pip"
  - cmd: "%PYTHON%\\python.exe -m pip install --only-binary :all: PyQt6 PyQt6-Qt6 PyQt6-sip"
  - cmd: "%PYTHON%\\python.exe -m pip install matplotlib numpy sounddevice scipy pyinstaller"

build_script:
  - cmd: >-
      %PYTHON%\python.exe -m PyInstaller --noconfirm --onedir --windowed
      --name Coherence
      --icon coherence\favicon.ico
      --hidden-import PyQt6.QtCore
      --hidden-import PyQt6.QtGui
      --hidden-import PyQt6.QtWidgets
      --hidden-import PyQt6.sip
      --hidden-import matplotlib.backends.backend_qtagg
      --hidden-import matplotlib.backends.backend_agg
      --hidden-import scipy.signal
      --hidden-import scipy.signal._upfirdn_apply
      --hidden-import sounddevice
      --exclude-module tkinter
      --exclude-module wx
      run_coherence.py
  - cmd: 7z a Coherence-Windows.zip dist\Coherence\

artifacts:
  - path: Coherence-Windows.zip
    name: Coherence-Windows
